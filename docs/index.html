<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sector Rotation Scanner</title>
<style>
  :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #e6edf3; --dim: #8b949e; --green: #3fb950; --red: #f85149; --yellow: #d29922; --blue: #58a6ff; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace; background: var(--bg); color: var(--text); padding: 20px; line-height: 1.4; }
  h1 { margin-bottom: 8px; font-size: 1.4em; }
  h2 { margin: 24px 0 12px; font-size: 1.1em; color: var(--blue); border-bottom: 1px solid var(--border); padding-bottom: 6px; }
  .meta { color: var(--dim); font-size: 0.85em; margin-bottom: 16px; }
  .loading { text-align: center; padding: 60px; color: var(--dim); font-size: 1.2em; }
  .error { color: var(--red); padding: 20px; }
  table { width: 100%; border-collapse: collapse; font-size: 0.82em; margin-bottom: 16px; }
  th, td { padding: 6px 10px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
  th { background: var(--card); color: var(--dim); font-weight: 600; text-transform: uppercase; font-size: 0.75em; letter-spacing: 0.5px; }
  tr:hover td { background: var(--card); }
  .pos { color: var(--green); }
  .neg { color: var(--red); }
  .neutral { color: var(--yellow); }
  .dim { color: var(--dim); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-weight: 700; font-size: 0.8em; }
  .badge-buy { background: #238636; color: #fff; }
  .badge-sell { background: #da3633; color: #fff; }
  .badge-hold { background: #9e6a03; color: #fff; }
  .badge-trim { background: #6e4b00; color: #fff; }
  .confidence-bar { display: inline-block; width: 80px; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; vertical-align: middle; margin-right: 6px; }
  .confidence-fill { height: 100%; border-radius: 4px; }
  .section { margin-bottom: 32px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 1200px) { .grid-2 { grid-template-columns: 1fr; } }
  .factors { font-size: 0.78em; color: var(--dim); margin-top: 4px; }
  .factors li { margin-left: 16px; }
  .high-conviction { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 16px; margin-bottom: 12px; }
  .high-conviction h3 { font-size: 0.95em; margin-bottom: 8px; }
  .mode-bar { display: flex; gap: 24px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .mode-group { display: flex; align-items: center; gap: 6px; }
  .mode-group label { color: var(--dim); font-size: 0.8em; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-right: 4px; }
  .mode-btn { background: var(--card); border: 1px solid var(--border); color: var(--dim); padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 0.82em; font-family: inherit; transition: all 0.15s; }
  .mode-btn:hover { border-color: var(--blue); color: var(--text); }
  .mode-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }
  .mode-desc { color: var(--dim); font-size: 0.78em; font-style: italic; margin-bottom: 12px; }
  /* Flow diagram */
  .flow-diagram { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 24px; }
  .flow-diagram h2 { margin-top: 0; }
  .flow-treemap { display: flex; flex-wrap: wrap; gap: 2px; width: 100%; min-height: 260px; }
  .flow-treemap-cell { position: relative; border-radius: 4px; padding: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; cursor: default; transition: opacity 0.15s; min-width: 60px; overflow: hidden; }
  .flow-treemap-cell:hover { opacity: 0.85; outline: 2px solid var(--accent, #58a6ff); outline-offset: -2px; }
  .flow-treemap-cell .tm-ticker { font-weight: 700; font-size: 15px; line-height: 1.2; }
  .flow-treemap-cell .tm-sector { font-size: 10px; opacity: 0.8; line-height: 1.2; margin-top: 2px; }
  .flow-treemap-cell .tm-flow { font-size: 13px; font-weight: 600; margin-top: 4px; }
  .flow-treemap-cell .tm-aum { font-size: 10px; opacity: 0.6; margin-top: 2px; }
  .flow-treemap-legend { display: flex; gap: 16px; align-items: center; margin-top: 10px; font-size: 11px; color: var(--dim); }
  .flow-treemap-legend span { display: inline-flex; align-items: center; gap: 4px; }
  .flow-treemap-legend .swatch { width: 14px; height: 14px; border-radius: 2px; display: inline-block; }
  /* Sector Diagnostics */
  .diag-panel { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 24px; }
  .diag-panel h2 { margin-top: 0; }
  .diag-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; }
  .diag-card { border: 1px solid var(--border); border-radius: 6px; padding: 12px; position: relative; }
  .diag-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .diag-card-header h3 { margin: 0; font-size: 14px; }
  .diag-phase { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.3px; }
  .diag-phase.early-acc { background: rgba(63,185,80,0.15); color: #3fb950; }
  .diag-phase.confirmed-up { background: rgba(63,185,80,0.3); color: #3fb950; }
  .diag-phase.late-stage { background: rgba(210,153,34,0.2); color: #d29922; }
  .diag-phase.neutral { background: rgba(139,148,158,0.15); color: var(--dim); }
  .diag-phase.distribution { background: rgba(248,81,73,0.15); color: #f85149; }
  .diag-phase.early-decline { background: rgba(248,81,73,0.2); color: #f85149; }
  .diag-phase.confirmed-down { background: rgba(248,81,73,0.3); color: #f85149; }
  .diag-evidence { list-style: none; padding: 0; margin: 0; font-size: 12px; line-height: 1.6; }
  .diag-evidence li { padding: 2px 0; color: var(--text); }
  .diag-evidence li::before { content: "• "; color: var(--dim); }
  .diag-metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px 12px; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); font-size: 11px; }
  .diag-metrics .metric-label { color: var(--dim); }
  .diag-metrics .metric-val { font-weight: 600; }
  /* RRG Quadrant Chart */
  .rrg-container { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 24px; }
  .rrg-container h2 { margin-top: 0; }
  .rrg-svg { width: 100%; max-width: 600px; margin: 0 auto; display: block; }
  .rrg-quadrant-label { font-size: 10px; fill: var(--dim); font-family: inherit; text-transform: uppercase; letter-spacing: 0.5px; }
  .rrg-dot { cursor: pointer; transition: r 0.15s; }
  .rrg-dot:hover { r: 8; }
  .rrg-dot-label { font-size: 9px; fill: var(--text); font-family: inherit; pointer-events: none; }
  .rrg-axis { stroke: var(--border); stroke-width: 1; }
  .rrg-axis-label { font-size: 9px; fill: var(--dim); font-family: inherit; }
  .rrg-legend { display: flex; gap: 16px; justify-content: center; margin-top: 10px; font-size: 0.78em; color: var(--dim); }
  .rrg-legend span { display: inline-flex; align-items: center; gap: 4px; }
  .rrg-legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  /* Date navigation */
  .date-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .date-nav button { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 0.85em; font-family: inherit; }
  .date-nav button:hover { border-color: var(--blue); }
  .date-nav button:disabled { opacity: 0.3; cursor: not-allowed; }
  .date-nav .date-label { color: var(--text); font-size: 0.9em; font-weight: 600; min-width: 100px; text-align: center; }
  .date-nav .date-hint { color: var(--dim); font-size: 0.75em; }
  /* Delta badges for day-over-day comparison */
  .delta { font-size: 0.75em; font-weight: 600; margin-left: 3px; opacity: 0.85; }
  .delta.pos { color: var(--green); }
  .delta.neg { color: var(--red); }
  .phase-change { font-size: 0.7em; color: var(--yellow); margin-top: 2px; font-style: italic; }
</style>
</head>
<body>
<h1>📊 Sector Rotation Scanner</h1>
<div class="meta" id="meta">Loading... &nbsp;|&nbsp; <a href="guide.html" style="color:var(--blue)">How to use this →</a></div>
<div class="mode-bar" id="mode-bar" style="display:none">
  <div class="mode-group">
    <label>Capital:</label>
    <button class="mode-btn active" data-mode="capital" data-value="deploy">💵 Deploy</button>
    <button class="mode-btn" data-mode="capital" data-value="rotate">🔄 Rotate</button>
  </div>
  <div class="mode-group">
    <label>Strategy:</label>
    <button class="mode-btn active" data-mode="strategy" data-value="momentum">📈 Momentum</button>
    <button class="mode-btn" data-mode="strategy" data-value="contrarian">🔄 Contrarian</button>
    <button class="mode-btn" data-mode="strategy" data-value="rotation">⚖️ Rotation</button>
  </div>
  <div class="mode-group">
    <label>Timeframe:</label>
    <button class="mode-btn active" data-mode="timeframe" data-value="5d">5D</button>
    <button class="mode-btn" data-mode="timeframe" data-value="1m">1M</button>
    <button class="mode-btn" data-mode="timeframe" data-value="3m">3M</button>
    <button class="mode-btn" data-mode="timeframe" data-value="1y">1Y</button>
  </div>
</div>
<div class="date-nav" id="date-nav" style="display:none">
  <button id="date-prev">← Prev</button>
  <span class="date-label" id="date-label">Today</span>
  <button id="date-next">Next →</button>
  <span class="date-hint" id="date-hint"></span>
</div>
<div class="mode-desc" id="mode-desc"></div>
<div id="app"><div class="loading">⏳ Fetching data from finviz...</div></div>

<script src="data.js"></script>
<script>
const $ = (sel, ctx = document) => ctx.querySelector(sel);
const $$ = (sel, ctx = document) => [...ctx.querySelectorAll(sel)];

function pct(v, decimals = 2) {
  const s = `${v >= 0 ? '+' : ''}${v.toFixed(decimals)}%`;
  return `<span class="${v > 0 ? 'pos' : v < 0 ? 'neg' : 'dim'}">${s}</span>`;
}

function badge(action) {
  const cls = `badge-${action.toLowerCase()}`;
  return `<span class="badge ${cls}">${action}</span>`;
}

function confidence(val) {
  const color = val >= 70 ? 'var(--green)' : val >= 50 ? 'var(--yellow)' : 'var(--dim)';
  return `<span class="confidence-bar"><span class="confidence-fill" style="width:${val}%;background:${color}"></span></span>${val}%`;
}

function trendBadge(phase) {
  if (!phase) return '<span class="dim">—</span>';
  const labels = {
    EARLY_UPTREND: '⬆ Early',
    ESTABLISHED_UPTREND: '⬆ Established',
    EXTENDED: '⚡ Extended',
    EARLY_DOWNTREND: '⬇ Early',
    ESTABLISHED_DOWNTREND: '⬇ Established',
    COUNTER_TREND_BOUNCE: '↩ Bounce',
    PULLBACK_IN_UPTREND: '↪ Pullback',
    NEUTRAL: '● Neutral',
  };
  const colors = {
    EARLY_UPTREND: 'var(--green)',
    ESTABLISHED_UPTREND: 'var(--green)',
    EXTENDED: 'var(--yellow)',
    EARLY_DOWNTREND: 'var(--red)',
    ESTABLISHED_DOWNTREND: 'var(--red)',
    COUNTER_TREND_BOUNCE: 'var(--yellow)',
    PULLBACK_IN_UPTREND: 'var(--blue)',
    NEUTRAL: 'var(--dim)',
  };
  return `<span style="color:${colors[phase] || 'var(--dim)'}">${labels[phase] || phase}</span>`;
}

function signal(s) {
  if (s === 'INFLOW') return '<span class="pos">▲ INFLOW</span>';
  if (s === 'OUTFLOW') return '<span class="neg">▼ OUTFLOW</span>';
  return '<span class="neutral">● NEUTRAL</span>';
}

function table(headers, rows) {
  const ths = headers.map(h => `<th>${h}</th>`).join('');
  const trs = rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('');
  return `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
}

function renderActionSignals(recs, title) {
  const rows = recs.map(r => [
    `<b>${r.ticker}</b>`,
    badge(r.action),
    r.label,
    confidence(r.confidence),
    `<span class="dim">${r.rationale}</span>`,
  ]);
  return `<h2>${title}</h2>` + table(['ETF', 'Action', 'Name', 'Confidence', 'Rationale'], rows);
}

function renderTrends(trends, title) {
  const rows = trends.map(t => [
    `<b>${t.ticker}</b>`,
    t.label,
    pct(t.sma20),
    pct(t.sma50),
    pct(t.sma200),
    t.rsi.toFixed(0),
    trendBadge(t.trendPhase),
  ]);
  return `<h2>${title}</h2>` + table(['ETF', 'Name', 'vs SMA20', 'vs SMA50', 'vs SMA200', 'RSI', 'Trend'], rows);
}

function renderFlows(flows) {
  const rows = flows.map(f => [
    `<b>${f.assetClass}</b>`,
    f.tickers.join(', '),
    pct(f.avgPerf1W),
    pct(f.avgPerf1M),
    pct(f.avgPerf3M),
    f.avgRelVolume.toFixed(2),
    f.flowScore.toFixed(1),
    signal(f.signal),
    trendBadge(f.trendPhase),
  ]);
  return `<h2>🌍 Asset Class Flows</h2>` + table(['Class', 'ETFs', '1W', '1M', '3M', 'Rel Vol', 'Score', 'Signal', 'Trend'], rows);
}

function renderRotation(signals) {
  const rows = signals.map(s => [
    `<b>${s.sector}</b>`,
    signal(s.signal),
    `<span class="${s.rotationScore > 8 ? 'pos' : s.rotationScore < -8 ? 'neg' : 'neutral'}">${s.rotationScore.toFixed(1)}</span>`,
    `<span class="${s.rankShift > 0 ? 'pos' : s.rankShift < 0 ? 'neg' : 'dim'}">${s.rankShift > 0 ? '+' : ''}${s.rankShift}</span>`,
    s.rank1W,
    s.rank3M,
  ]);
  return `<h2>🔄 Sector Rotation</h2>` + table(['Sector', 'Signal', 'Score', 'Rank Δ', 'Rank 1W', 'Rank 3M'], rows);
}

function renderHighConviction(recs) {
  const high = recs.filter(r => r.confidence >= 65 && r.action !== 'HOLD');
  if (high.length === 0) return '';
  const cards = high.map(r => {
    const color = r.action === 'BUY' ? 'var(--green)' : 'var(--red)';
    const factorsHtml = r.factors.map(f => `<li>${f}</li>`).join('');
    return `<div class="high-conviction">
      <h3 style="color:${color}">${badge(r.action)} ${r.ticker} — ${r.label} (${r.confidence}%)</h3>
      <p class="dim">${r.rationale}</p>
      <ul class="factors">${factorsHtml}</ul>
    </div>`;
  }).join('');
  return `<h2>🎯 High-Conviction Signals</h2>${cards}`;
}

const modeDescriptions = {
  deploy_momentum: 'Fresh capital — buy ETFs with strongest trends and inflows. Cash is a valid position.',
  deploy_contrarian: 'Fresh capital — buy beaten-down ETFs with oversold readings. Fade euphoria.',
  deploy_rotation: 'Fresh capital — buy sectors gaining relative rank. Catch inflection points.',
  rotate_momentum: 'Rebalance — overweight strongest trends, underweight weakest. Always fully invested.',
  rotate_contrarian: 'Rebalance — overweight oversold sectors, underweight overbought. Mean reversion.',
  rotate_rotation: 'Rebalance — shift weight toward improving relative rank. Paired sector trades.',
};

function renderFlowDiagram(signals, fundFlows, timeframe) {
  const hasRealFlows = fundFlows && fundFlows.length > 0 &&
    fundFlows.some(f => f.flow5Day !== 0 || f.flow1Month !== 0 || f.flow3Month !== 0 || f.flow1Year !== 0);

  if (!hasRealFlows) {
    return renderRotationHeatmap(signals, timeframe);
  }

  return renderFlowTreemap(fundFlows, timeframe);
}

/**
 * Squarified treemap layout (Bruls, Huizing, van Wijk algorithm).
 * Takes items with .value (area), returns items with x, y, w, h in [0, totalW] × [0, totalH].
 */
function squarify(items, totalW, totalH) {
  const totalVal = items.reduce((s, d) => s + d.value, 0);
  if (totalVal === 0 || items.length === 0) return [];

  // Normalize values to area pixels
  const area = totalW * totalH;
  const scaled = items.map(d => ({ ...d, area: (d.value / totalVal) * area }));
  // Sort descending for better aspect ratios
  scaled.sort((a, b) => b.area - a.area);

  const laid = [];
  let x = 0, y = 0, w = totalW, h = totalH;

  function worst(row, side) {
    const rowArea = row.reduce((s, r) => s + r.area, 0);
    const s2 = side * side;
    let mx = 0;
    for (const r of row) {
      const ratio = (s2 * r.area) / (rowArea * rowArea);
      const inv = (rowArea * rowArea) / (s2 * r.area);
      mx = Math.max(mx, ratio, inv);
    }
    return mx;
  }

  let i = 0;
  while (i < scaled.length) {
    const vertical = w >= h; // lay along shorter side
    const side = vertical ? h : w;
    const row = [scaled[i]];
    let bestWorst = worst(row, side);
    i++;

    while (i < scaled.length) {
      const candidate = [...row, scaled[i]];
      const cw = worst(candidate, side);
      if (cw <= bestWorst) {
        row.push(scaled[i]);
        bestWorst = cw;
        i++;
      } else break;
    }

    // Lay out row
    const rowArea = row.reduce((s, r) => s + r.area, 0);
    const thickness = side > 0 ? rowArea / side : 0;

    let offset = 0;
    for (const r of row) {
      const len = r.area / (thickness || 1);
      if (vertical) {
        laid.push({ ...r, x: x, y: y + offset, w: thickness, h: len });
      } else {
        laid.push({ ...r, x: x + offset, y: y, w: len, h: thickness });
      }
      offset += len;
    }

    if (vertical) { x += thickness; w -= thickness; }
    else { y += thickness; h -= thickness; }
  }

  return laid;
}

function renderFlowTreemap(fundFlows, timeframe) {
  const field = getFlowField(timeframe);
  const sharesField = { '5d': 'sharesPct5Day', '1m': 'sharesPct1Month', '3m': 'sharesPct3Month', '1y': 'sharesPct1Year' }[timeframe] || 'sharesPct5Day';
  const tfLabel = TIMEFRAME_LABELS[timeframe] || '5-Day';

  // Format dollar amounts
  function fmtDollars(val) {
    if (val === 0) return '—';
    const abs = Math.abs(val);
    const sign = val > 0 ? '+' : '-';
    if (abs >= 1e9) return `${sign}$${(abs / 1e9).toFixed(1)}B`;
    if (abs >= 1e6) return `${sign}$${(abs / 1e6).toFixed(0)}M`;
    if (abs >= 1e3) return `${sign}$${(abs / 1e3).toFixed(0)}K`;
    return `${sign}$${abs.toFixed(0)}`;
  }

  function fmtAUM(val) {
    if (val >= 1e9) return `$${(val / 1e9).toFixed(1)}B`;
    if (val >= 1e6) return `$${(val / 1e6).toFixed(0)}M`;
    return `$${(val / 1e3).toFixed(0)}K`;
  }

  function fmtShares(val) {
    if (val >= 1e9) return `${(val / 1e9).toFixed(2)}B`;
    if (val >= 1e6) return `${(val / 1e6).toFixed(0)}M`;
    return `${(val / 1e3).toFixed(0)}K`;
  }

  function fmtPct(val) {
    if (val === 0) return '—';
    const sign = val > 0 ? '+' : '';
    return `${sign}${(val * 100).toFixed(2)}%`;
  }

  // Color: green for inflow, red for outflow, intensity by magnitude relative to AUM
  const flowVals = fundFlows.map(f => Math.abs(f[field]));
  const maxFlow = Math.max(...flowVals, 1);

  function flowColor(val) {
    if (val === 0) return 'var(--border)';
    const intensity = Math.min(Math.abs(val) / maxFlow, 1);
    const alpha = 0.2 + intensity * 0.6;
    if (val > 0) return `rgba(63, 185, 80, ${alpha.toFixed(2)})`;
    return `rgba(248, 81, 73, ${alpha.toFixed(2)})`;
  }

  function textColor(val) {
    if (val === 0) return 'var(--dim)';
    return val > 0 ? '#3fb950' : '#f85149';
  }

  // Build treemap items sized by AUM
  const items = fundFlows
    .filter(f => f.totalAssets > 0)
    .map(f => ({ ...f, value: f.totalAssets }));

  if (items.length === 0) return '';

  // Layout
  const TW = 900, TH = 340;
  const cells = squarify(items, TW, TH);

  // Build HTML using absolute-positioned divs inside a relative container
  let html = `<div class="flow-treemap" style="position:relative;width:100%;max-width:${TW}px;height:${TH}px;gap:0">`;
  for (const c of cells) {
    const flowVal = c[field];
    const bg = flowColor(flowVal);
    const tc = textColor(flowVal);
    const pctX = (c.x / TW * 100).toFixed(3);
    const pctY = (c.y / TH * 100).toFixed(3);
    const pctW = (c.w / TW * 100).toFixed(3);
    const pctH = (c.h / TH * 100).toFixed(3);
    const showSector = c.w > 70 && c.h > 70;
    const showFlow = c.w > 55 && c.h > 50;
    const showAUM = c.w > 70 && c.h > 80;

    html += `<div class="flow-treemap-cell" style="position:absolute;left:${pctX}%;top:${pctY}%;width:${pctW}%;height:${pctH}%;background:${bg}" title="${c.ticker} (${c.sector})\nAUM: ${fmtAUM(c.totalAssets)}\nShares: ${fmtShares(c.sharesOutstanding)} (${fmtPct(c[sharesField])})\n${tfLabel} Flow: ${fmtDollars(flowVal)}">`;
    html += `<span class="tm-ticker">${c.ticker}</span>`;
    if (showSector) html += `<span class="tm-sector">${c.sector}</span>`;
    if (showFlow) html += `<span class="tm-flow" style="color:${tc}">${fmtDollars(flowVal)}</span>`;
    if (showAUM) html += `<span class="tm-aum">${fmtPct(c[sharesField])} shares</span>`;
    html += `</div>`;
  }
  html += '</div>';

  // Summary
  const totalNet = fundFlows.reduce((sum, f) => sum + f[field], 0);
  const netLabel = totalNet === 0 ? '<span class="dim">No data yet</span>'
    : totalNet >= 0
      ? `<span class="pos">+${fmtDollars(totalNet).replace('+','')} net inflow</span>`
      : `<span class="neg">${fmtDollars(totalNet)} net outflow</span>`;

  // Legend
  const legend = `<div class="flow-treemap-legend">
    <span><span class="swatch" style="background:rgba(63,185,80,0.5)"></span> Inflow</span>
    <span><span class="swatch" style="background:rgba(248,81,73,0.5)"></span> Outflow</span>
    <span><span class="swatch" style="background:var(--border)"></span> No data</span>
    <span style="margin-left:auto">Size = AUM &nbsp;|&nbsp; Color = ${tfLabel} flow</span>
  </div>`;

  // Shares outstanding table
  const sorted = [...fundFlows].sort((a, b) => b[sharesField] - a[sharesField]);
  let sharesTable = `<details style="margin-top:16px"><summary style="cursor:pointer;font-size:13px;color:var(--dim)">📊 Shares Outstanding Changes (${tfLabel})</summary>`;
  sharesTable += '<table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:8px">';
  sharesTable += '<thead><tr><th style="text-align:left;padding:4px 8px;border-bottom:1px solid var(--border)">ETF</th><th style="text-align:left;padding:4px 8px;border-bottom:1px solid var(--border)">Sector</th><th style="text-align:right;padding:4px 8px;border-bottom:1px solid var(--border)">Shares</th><th style="text-align:right;padding:4px 8px;border-bottom:1px solid var(--border)">Δ Shares</th><th style="text-align:right;padding:4px 8px;border-bottom:1px solid var(--border)">Flow</th></tr></thead><tbody>';
  for (const f of sorted) {
    const pct = f[sharesField];
    const pctStr = fmtPct(pct);
    const cls = pct > 0 ? 'pos' : pct < 0 ? 'neg' : 'dim';
    sharesTable += `<tr>`;
    sharesTable += `<td style="padding:3px 8px;border-bottom:1px solid var(--border)"><b>${f.ticker}</b></td>`;
    sharesTable += `<td style="padding:3px 8px;border-bottom:1px solid var(--border)">${f.sector}</td>`;
    sharesTable += `<td style="padding:3px 8px;text-align:right;border-bottom:1px solid var(--border)">${fmtShares(f.sharesOutstanding)}</td>`;
    sharesTable += `<td style="padding:3px 8px;text-align:right;border-bottom:1px solid var(--border)" class="${cls}">${pctStr}</td>`;
    sharesTable += `<td style="padding:3px 8px;text-align:right;border-bottom:1px solid var(--border)" class="${cls}">${fmtDollars(f[field])}</td>`;
    sharesTable += `</tr>`;
  }
  sharesTable += '</tbody></table></details>';

  return `<div class="flow-diagram">
    <h2>💰 Sector Fund Flows (${tfLabel})</h2>
    <div style="margin-bottom:12px;font-size:0.85em;color:var(--dim)">
      5D/1M: Estimated (N-PORT + daily prices) &nbsp;|&nbsp; 3M/1Y: SEC N-PORT filings &nbsp;|&nbsp; ${netLabel}
    </div>
    ${html}
    ${legend}
    ${sharesTable}
  </div>`;
}

// Fallback: rotation score heatmap when no real flow data
function renderRotationHeatmap(signals, timeframe) {
  if (!signals || signals.length === 0) return '';

  const sorted = [...signals].sort((a, b) => b.rotationScore - a.rotationScore);
  const maxAbs = Math.max(...signals.map(s => Math.abs(s.rotationScore)), 1);

  function scoreColor(val) {
    const intensity = Math.min(Math.abs(val) / maxAbs, 1);
    const alpha = 0.15 + intensity * 0.6;
    if (val > 0) return `rgba(63, 185, 80, ${alpha.toFixed(2)})`;
    if (val < 0) return `rgba(248, 81, 73, ${alpha.toFixed(2)})`;
    return 'transparent';
  }

  // Use rotation scores as "value" for treemap sizing (absolute values)
  const items = sorted.map(s => ({ ...s, value: Math.abs(s.rotationScore) + 1 }));
  const TW = 900, TH = 280;
  const cells = squarify(items, TW, TH);

  let html = `<div class="flow-treemap" style="position:relative;width:100%;max-width:${TW}px;height:${TH}px;gap:0">`;
  for (const c of cells) {
    const bg = scoreColor(c.rotationScore);
    const tc = c.signal === 'INFLOW' ? '#3fb950' : c.signal === 'OUTFLOW' ? '#f85149' : 'var(--dim)';
    const pctX = (c.x / TW * 100).toFixed(3);
    const pctY = (c.y / TH * 100).toFixed(3);
    const pctW = (c.w / TW * 100).toFixed(3);
    const pctH = (c.h / TH * 100).toFixed(3);

    html += `<div class="flow-treemap-cell" style="position:absolute;left:${pctX}%;top:${pctY}%;width:${pctW}%;height:${pctH}%;background:${bg}" title="${c.sector}\nScore: ${c.rotationScore.toFixed(1)}\nSignal: ${c.signal}\nRank Δ: ${c.rankShift > 0 ? '+' : ''}${c.rankShift}">`;
    html += `<span class="tm-ticker" style="color:${tc}">${c.sector}</span>`;
    html += `<span class="tm-flow" style="color:${tc}">${c.rotationScore.toFixed(1)}</span>`;
    html += `<span class="tm-sector">${c.signal}</span>`;
    html += `</div>`;
  }
  html += '</div>';

  return `<div class="flow-diagram">
    <h2>💰 Sector Rotation Scores</h2>
    <div style="margin-bottom:12px;font-size:0.85em;color:var(--dim)">Based on price momentum, breadth, and relative rank (real fund flow data not yet available)</div>
    ${html}
  </div>`;
}

function renderDiagnostics(diagnostics) {
  if (!diagnostics || diagnostics.length === 0) return '';

  // Build lookup of previous day's diagnostics by ticker
  const prevDiag = {};
  if (prevDayData && prevDayData.diagnostics) {
    for (const pd of prevDayData.diagnostics) {
      prevDiag[pd.ticker] = pd;
    }
  }
  const hasPrev = Object.keys(prevDiag).length > 0;
  const prevDate = prevDayData ? (prevDayData.timestamp || '').slice(0, 10) : '';

  // Delta badge: shows change vs previous day
  function delta(current, previous, fmt, invertColor) {
    if (!hasPrev || previous === undefined || previous === 0 || current === 0) return '';
    const diff = current - previous;
    if (Math.abs(diff) < 0.001) return '';
    const sign = diff > 0 ? '+' : '';
    const cls = invertColor
      ? (diff > 0 ? 'neg' : 'pos')    // higher = bad (e.g. short ratio, P/C)
      : (diff > 0 ? 'pos' : 'neg');   // higher = good
    return ` <span class="delta ${cls}" title="vs ${prevDate}">${sign}${fmt(diff)}</span>`;
  }

  const phaseLabels = {
    EARLY_ACCUMULATION: 'Early Accumulation',
    CONFIRMED_UPTREND: 'Confirmed Uptrend',
    LATE_STAGE: 'Late Stage',
    NEUTRAL: 'Neutral',
    DISTRIBUTION: 'Distribution',
    EARLY_DECLINE: 'Early Decline',
    CONFIRMED_DOWNTREND: 'Confirmed Downtrend',
  };

  const phaseClass = {
    EARLY_ACCUMULATION: 'early-acc',
    CONFIRMED_UPTREND: 'confirmed-up',
    LATE_STAGE: 'late-stage',
    NEUTRAL: 'neutral',
    DISTRIBUTION: 'distribution',
    EARLY_DECLINE: 'early-decline',
    CONFIRMED_DOWNTREND: 'confirmed-down',
  };

  const fmtPct = v => (v * 100).toFixed(0) + '%';
  const fmtPct2 = v => v.toFixed(2) + '%';
  const fmtDec = v => v.toFixed(2);
  const fmtInt = v => Math.round(v).toString();

  let cards = '';
  for (const d of diagnostics) {
    const pLabel = phaseLabels[d.phase] || d.phase;
    const pClass = phaseClass[d.phase] || 'neutral';
    const prev = prevDiag[d.ticker];

    // Phase change indicator
    let phaseChange = '';
    if (prev && prev.phase && prev.phase !== d.phase) {
      const prevLabel = phaseLabels[prev.phase] || prev.phase;
      phaseChange = `<div class="phase-change" title="Phase changed from ${prevLabel}">← ${prevLabel}</div>`;
    }

    const evidenceHtml = d.evidence.length > 0
      ? `<ul class="diag-evidence">${d.evidence.map(e => `<li>${e}</li>`).join('')}</ul>`
      : '<div style="font-size:12px;color:var(--dim)">No strong signals detected</div>';

    cards += `<div class="diag-card">
      <div class="diag-card-header">
        <h3>${d.ticker} — ${d.sector}</h3>
        <span class="diag-phase ${pClass}">${pLabel}</span>
        ${phaseChange}
      </div>
      ${evidenceHtml}
      <div class="diag-metrics">
        <div><span class="metric-label">1W</span> <span class="metric-val">${d.perf1W > 0 ? '+' : ''}${d.perf1W.toFixed(2)}%${delta(d.perf1W, prev?.perf1W, fmtPct2, false)}</span></div>
        <div><span class="metric-label">Breadth</span> <span class="metric-val">${d.breadth1W.toFixed(0)}%${delta(d.breadth1W, prev?.breadth1W, fmtInt, false)}</span></div>
        <div><span class="metric-label">Rank</span> <span class="metric-val">#${d.rank1W}${delta(d.rank1W, prev?.rank1W, fmtInt, true)}</span></div>
        <div><span class="metric-label">MCW-EW</span> <span class="metric-val">${d.sizeSpread > 0 ? '+' : ''}${d.sizeSpread.toFixed(2)}%</span></div>
        <div><span class="metric-label">Shares Δ</span> <span class="metric-val">${d.sharesPctChange !== 0 ? (d.sharesPctChange > 0 ? '+' : '') + (d.sharesPctChange * 100).toFixed(2) + '%' : '—'}</span></div>
        <div><span class="metric-label">Velocity</span> <span class="metric-val">${d.rankVelocity > 0 ? '+' : ''}${d.rankVelocity}</span></div>
        <div><span class="metric-label">DP Short</span> <span class="metric-val ${d.darkPoolShortRatio5d >= 0.5 ? 'neg' : d.darkPoolShortRatio5d > 0 && d.darkPoolShortRatio5d < 0.35 ? 'pos' : ''}">${d.darkPoolShortRatio5d > 0 ? (d.darkPoolShortRatio5d * 100).toFixed(0) + '%' : d.darkPoolShortRatio > 0 ? (d.darkPoolShortRatio * 100).toFixed(0) + '%' : '—'}${delta(d.darkPoolShortRatio5d || d.darkPoolShortRatio, prev?.darkPoolShortRatio5d || prev?.darkPoolShortRatio, fmtPct, true)}</span></div>
        <div><span class="metric-label">DP Trend</span> <span class="metric-val ${d.darkPoolTrend === 'INCREASING' ? 'neg' : d.darkPoolTrend === 'DECREASING' ? 'pos' : ''}">${d.darkPoolTrend === 'INCREASING' ? '↑ Rising' : d.darkPoolTrend === 'DECREASING' ? '↓ Falling' : '→ Stable'}</span></div>
        <div><span class="metric-label">P/C Ratio</span> <span class="metric-val ${d.putCallRatio >= 1.3 ? 'neg' : d.putCallRatio > 0 && d.putCallRatio < 0.5 ? 'pos' : ''}">${d.putCallRatio > 0 ? d.putCallRatio.toFixed(2) : '—'}${delta(d.putCallRatio, prev?.putCallRatio, fmtDec, true)}</span></div>
        <div><span class="metric-label">IV</span> <span class="metric-val">${d.impliedVolatility > 0 ? (d.impliedVolatility * 100).toFixed(0) + '%' : '—'}${delta(d.impliedVolatility, prev?.impliedVolatility, fmtPct, true)}</span></div>
      </div>
    </div>`;
  }

  return `<div class="diag-panel">
    <h2>🔬 Sector Phase Diagnostics</h2>
    <div style="margin-bottom:12px;font-size:0.82em;color:var(--dim)">
      Phase determined by convergence of momentum, breadth, size leadership, flow-price alignment, rank velocity, dark pool short volume, and options positioning.${hasPrev ? ` <span style="color:var(--yellow)">Deltas vs ${prevDate}</span>` : ''} Evidence shows raw data behind each classification.
    </div>
    <div class="diag-grid">${cards}</div>
  </div>`;
}

function renderRRG(signals) {
  if (!signals || signals.length === 0) return '';

  // X axis = rotationScore (relative strength), Y axis = rankShift (momentum)
  const W = 500, H = 500, pad = 50;
  const innerW = W - 2 * pad, innerH = H - 2 * pad;

  // Find data range for scaling
  const scores = signals.map(s => s.rotationScore);
  const shifts = signals.map(s => s.rankShift);
  const maxAbsScore = Math.max(Math.abs(Math.min(...scores)), Math.abs(Math.max(...scores)), 10);
  const maxAbsShift = Math.max(Math.abs(Math.min(...shifts)), Math.abs(Math.max(...shifts)), 3);

  // Map to SVG coordinates (centered at midpoint)
  const cx = pad + innerW / 2;
  const cy = pad + innerH / 2;
  const scaleX = (innerW / 2) / maxAbsScore;
  const scaleY = (innerH / 2) / maxAbsShift;

  function toX(score) { return cx + score * scaleX; }
  function toY(shift) { return cy - shift * scaleY; } // invert Y: positive = up

  // Quadrant colors (subtle backgrounds)
  const quadrants = [
    { x: cx, y: pad, w: innerW/2, h: innerH/2, fill: '#3fb95010', label: 'LEADING', lx: cx + innerW/4, ly: pad + 16 },
    { x: pad, y: pad, w: innerW/2, h: innerH/2, fill: '#58a6ff10', label: 'IMPROVING', lx: pad + innerW/4, ly: pad + 16 },
    { x: pad, y: cy, w: innerW/2, h: innerH/2, fill: '#f8514910', label: 'LAGGING', lx: pad + innerW/4, ly: cy + 16 },
    { x: cx, y: cy, w: innerW/2, h: innerH/2, fill: '#d2992210', label: 'WEAKENING', lx: cx + innerW/4, ly: cy + 16 },
  ];

  let svg = `<svg class="rrg-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">`;

  // Quadrant backgrounds
  for (const q of quadrants) {
    svg += `<rect x="${q.x}" y="${q.y}" width="${q.w}" height="${q.h}" fill="${q.fill}"/>`;
    svg += `<text class="rrg-quadrant-label" x="${q.lx}" y="${q.ly}" text-anchor="middle">${q.label}</text>`;
  }

  // Axes
  svg += `<line class="rrg-axis" x1="${pad}" y1="${cy}" x2="${W - pad}" y2="${cy}"/>`;
  svg += `<line class="rrg-axis" x1="${cx}" y1="${pad}" x2="${cx}" y2="${H - pad}"/>`;

  // Axis labels
  svg += `<text class="rrg-axis-label" x="${W - pad}" y="${cy - 6}" text-anchor="end">Strong →</text>`;
  svg += `<text class="rrg-axis-label" x="${pad}" y="${cy - 6}">← Weak</text>`;
  svg += `<text class="rrg-axis-label" x="${cx + 6}" y="${pad + 4}">↑ Gaining</text>`;
  svg += `<text class="rrg-axis-label" x="${cx + 6}" y="${H - pad - 4}">↓ Losing</text>`;

  // Plot each sector
  for (const s of signals) {
    const x = toX(s.rotationScore);
    const y = toY(s.rankShift);

    // Color by quadrant position
    let color;
    if (s.rotationScore > 0 && s.rankShift > 0) color = 'var(--green)';       // Leading
    else if (s.rotationScore <= 0 && s.rankShift > 0) color = 'var(--blue)';   // Improving
    else if (s.rotationScore <= 0 && s.rankShift <= 0) color = 'var(--red)';   // Lagging
    else color = 'var(--yellow)';                                               // Weakening

    svg += `<circle class="rrg-dot" cx="${x}" cy="${y}" r="5" fill="${color}">`;
    svg += `<title>${s.sector}\nScore: ${s.rotationScore.toFixed(1)}\nRank Δ: ${s.rankShift > 0 ? '+' : ''}${s.rankShift}</title>`;
    svg += `</circle>`;
    svg += `<text class="rrg-dot-label" x="${x + 7}" y="${y + 3}">${s.sector.replace('Consumer ', 'Cons. ')}</text>`;
  }

  svg += '</svg>';

  const legend = `<div class="rrg-legend">
    <span><span class="rrg-legend-dot" style="background:var(--green)"></span> Leading</span>
    <span><span class="rrg-legend-dot" style="background:var(--yellow)"></span> Weakening</span>
    <span><span class="rrg-legend-dot" style="background:var(--red)"></span> Lagging</span>
    <span><span class="rrg-legend-dot" style="background:var(--blue)"></span> Improving</span>
  </div>`;

  return `<div class="rrg-container">
    <h2>🔄 Relative Rotation Graph</h2>
    <div style="font-size:0.78em;color:var(--dim);margin-bottom:8px">X = Relative Strength (Score) &nbsp;|&nbsp; Y = Momentum (Rank Δ)</div>
    ${svg}
    ${legend}
  </div>`;
}

let currentData = null;
let prevDayData = null; // previous day's snapshot for comparison deltas
let currentCapital = 'deploy';
let currentStrategy = 'momentum';
let currentTimeframe = '5d';
let availableDates = [];
let currentDateIdx = -1; // -1 = today (latest)

const TIMEFRAME_LABELS = { '5d': '5-Day', '1m': '1-Month', '3m': '3-Month', '1y': '1-Year' };

function getFlowField(tf) {
  const map = { '5d': 'flow5Day', '1m': 'flow1Month', '3m': 'flow3Month', '1y': 'flow1Year' };
  return map[tf] || 'flow5Day';
}

function getModeKey() { return `${currentCapital}_${currentStrategy}`; }

function getSignals() {
  if (!currentData) return null;
  const key = getModeKey();
  // Support both old format (sector/assetClass directly) and new format (keyed by mode)
  if (currentData.actionSignals[key]) return currentData.actionSignals[key];
  return currentData.actionSignals;
}

function renderDashboard() {
  const data = currentData;
  const signals = getSignals();
  if (!data || !signals) return;

  const allRecs = [...(signals.sector || []), ...(signals.assetClass || [])];

  let html = '';
  html += renderFlowDiagram(data.rotationSignals, data.fundFlows, currentTimeframe);
  html += renderDiagnostics(data.diagnostics);
  html += renderHighConviction(allRecs);
  html += '<div class="grid-2">';
  html += '<div>' + renderActionSignals(signals.sector || [], '🎯 Sector Actions') + '</div>';
  html += '<div>' + renderActionSignals(signals.assetClass || [], '🎯 Asset Class Actions') + '</div>';
  html += '</div>';
  html += renderFlows(data.assetClassFlows);
  html += renderRotation(data.rotationSignals);
  html += renderRRG(data.rotationSignals);
  html += '<div class="grid-2">';
  html += '<div>' + renderTrends(data.sectorTrends, '📈 Sector Trends') + '</div>';
  html += '<div>' + renderTrends(data.assetClassTrends, '📈 ETF Trends') + '</div>';
  html += '</div>';

  $('#app').innerHTML = html;
  $('#mode-desc').textContent = modeDescriptions[getModeKey()] || '';
}

function setupModeBar() {
  const bar = $('#mode-bar');
  bar.style.display = 'flex';

  bar.addEventListener('click', (e) => {
    const btn = e.target.closest('.mode-btn');
    if (!btn) return;

    const mode = btn.dataset.mode;
    const value = btn.dataset.value;

    // Update active state for this group
    $$(`[data-mode="${mode}"]`, bar).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    if (mode === 'capital') currentCapital = value;
    else if (mode === 'timeframe') currentTimeframe = value;
    else currentStrategy = value;

    renderDashboard();
  });
}

async function loadDateData(date) {
  // Try fetch first, fall back to checking if __FINVIZ_DATA matches the date
  try {
    const res = await fetch(`history/${date}.json`);
    if (res.ok) return await res.json();
  } catch {}
  // If today's data matches the requested date, use it
  if (window.__FINVIZ_DATA && window.__FINVIZ_DATA.timestamp.startsWith(date)) {
    return window.__FINVIZ_DATA;
  }
  return null;
}

function updateDateNav() {
  const nav = $('#date-nav');
  const label = $('#date-label');
  const hint = $('#date-hint');
  const prevBtn = $('#date-prev');
  const nextBtn = $('#date-next');

  if (availableDates.length <= 1) {
    nav.style.display = 'none';
    return;
  }
  nav.style.display = 'flex';

  const isLatest = currentDateIdx === availableDates.length - 1 || currentDateIdx === -1;
  const idx = currentDateIdx === -1 ? availableDates.length - 1 : currentDateIdx;

  label.textContent = isLatest ? `${availableDates[idx]} (Latest)` : availableDates[idx];
  hint.textContent = `${idx + 1} of ${availableDates.length} snapshots`;
  prevBtn.disabled = idx <= 0;
  nextBtn.disabled = isLatest;
}

async function navigateDate(direction) {
  const idx = currentDateIdx === -1 ? availableDates.length - 1 : currentDateIdx;
  const newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= availableDates.length) return;

  const date = availableDates[newIdx];
  const data = await loadDateData(date);
  if (!data) {
    $('#app').innerHTML = `<div class="error">No data for ${date}</div>`;
    return;
  }

  currentDateIdx = newIdx;
  currentData = data;

  // Load previous day for comparison deltas
  if (newIdx > 0) {
    prevDayData = await loadDateData(availableDates[newIdx - 1]);
  } else {
    prevDayData = null;
  }

  $('#meta').innerHTML = `${currentData.stockCount} stocks analyzed &bull; ${currentData.timestamp} &nbsp;|&nbsp; <a href="guide.html" style="color:var(--blue)">How to use this &rarr;</a>`;
  updateDateNav();
  renderDashboard();
}

function setupDateNav() {
  $('#date-prev').addEventListener('click', () => navigateDate(-1));
  $('#date-next').addEventListener('click', () => navigateDate(1));
}

async function load() {
  try {
    let data = null;
    try {
      const res = await fetch('/api/data');
      if (res.ok) data = await res.json();
    } catch {}
    if (!data) {
      try {
        const res2 = await fetch('data.json');
        if (res2.ok) data = await res2.json();
      } catch {}
    }
    if (!data && window.__FINVIZ_DATA) {
      data = window.__FINVIZ_DATA;
    }
    if (!data) throw new Error('Could not load data (try running the server)');
    currentData = data;

    // Load available dates manifest
    try {
      const mRes = await fetch('history/index.json');
      if (mRes.ok) availableDates = await mRes.json();
    } catch {}
    // Fallback: use embedded availableDates from data (works with file:// protocol)
    if (availableDates.length === 0 && currentData.availableDates) {
      availableDates = currentData.availableDates;
    }
    // If still nothing, treat today as the only date
    if (availableDates.length === 0 && currentData.timestamp) {
      availableDates = [currentData.timestamp.slice(0, 10)];
    }
    currentDateIdx = availableDates.length - 1;

    // Load previous day's snapshot for comparison deltas
    if (availableDates.length >= 2) {
      prevDayData = await loadDateData(availableDates[availableDates.length - 2]);
    }

    $('#meta').innerHTML = `${currentData.stockCount} stocks analyzed &bull; ${currentData.timestamp} &nbsp;|&nbsp; <a href="guide.html" style="color:var(--blue)">How to use this &rarr;</a>`;

    setupModeBar();
    setupDateNav();
    updateDateNav();
    renderDashboard();
  } catch (err) {
    $('#app').innerHTML = `<div class="error">Error: ${err.message}</div>`;
  }
}

load();
</script>
